<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="margin-left:500px">This is Signup page</h1>
    <div class="container">
        <div class="details">
            <div class="input">
            <label>Name:</label>
            <input type="text" placeholder="Whats Your name" style="margin:20px; height:30px;" id="name">
            </div>
            <div class="input">
            <label>Password:</label>
            <input type="password" placeholder="Enter Password" id="pass" style="margin:20px; height:30px;">
            </div>
            <div class="input">
            <label>Confirm Password:</label>
            <input type="password" placeholder="Confirm Password" id="pass1" style="margin:20px; height:30px;">
            </div>
            <button style="margin-left:550px; height: 50px; width:150px; font-size:30px;" onclick="sign()"> Signup</button>
        </div>
    </div>
    <style>
        .details{
            place-items:center;
            padding:20px;
            gap:5px;
            border:20px;
        }
    </style>
    <script>
        function sign(){
        let user=document.getElementById("name").value;
        let pass=document.getElementById("pass").value;
        let pass1=document.getElementById("pass1").value;
            if (user==="" || pass=="") {
                alert('please fill details');
                return;
            } else if (pass!==pass1){
                alert('please check pass words again');
                return;
            }else{
                localStorage.setItem("user",user);
                localStorage.setItem("pass",pass1);
                alert("Signup Successsully completed!");
                window.location.href="login.html";  
            }    
        };
    </script>
</body>
</html>
