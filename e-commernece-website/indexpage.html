<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-commerence website</title>
    <link rel="stylesheet" href="indexpage.css">
</head>
<body>
    <main class="main">
        <div class="login both" id="login-form">
            <h1>Hi Welcome</h1>
            <p>Please Enter Your Details</p>
            <div class="ins">
            <input type="text" placeholder="Enter Email" id="username">
            </div>
            <div class="ins">
            <input type="password" placeholder="Enter password" id="password">
            <a style="margin-top:20px; cursor: pointer; text-decoration: underline;" class="forg">Forget password</a>
            </div>
            <button style="margin-top:15px; cursor: pointer;" onclick="check()">Login</button>
            <div class="bottom">
            <p>Don't have an account ?</p>
            <a id="sign" onclick="showsignup()" style="margin-left:5px; color:aliceblue; text-decoration:underline; cursor: pointer;">Sign-up</a>
            </div>
        </div>
        <div class="Sign-up both" id="Signup-form">
            <h1>Create Account</h1>
            <div class="ins">
            <input type="text" placeholder="Enter your new username" id="newuser">
            </div>
            <div class="ins">
                <input type="text" placeholder="Enter new password" id="newuser">            
            </div> 
            <div class="ins">
            <input type="password" id="newpass1" placeholder="passwords should be same">
            </div>   
            <button style="margin-top:10px;" onclick="register()">Confirm</button>
            <a style="margin-top:15px; cursor: pointer; color:rgb(111, 0, 255); text-decoration:underline;" onclick="here()">Back to login</a>
        </div>
    </main>
    <script src="indexpage.js" defer></script>
</body>
</html>
